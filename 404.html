<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorthIt — Page not found</title>
  <meta name="theme-color" content="#0b1020" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(15,23,42,.84);
      --border: rgba(148,163,184,.16);
      --text: #f8fafc;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124,58,237,.22), transparent 28%),
        radial-gradient(circle at top right, rgba(59,130,246,.18), transparent 24%),
        linear-gradient(180deg, #08101f 0%, #0b1020 100%);
      padding: 24px;
    }
    .card {
      width: min(100%, 540px);
      padding: 32px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 70px rgba(2,6,23,.42);
    }
    .eyebrow {
      display: inline-block;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #c4b5fd;
    }
    h1 {
      margin: 14px 0 12px;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: .98;
      letter-spacing: -.06em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
    }
    .primary {
      color: white;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      box-shadow: 0 18px 35px rgba(76,83,255,.26);
    }
    .secondary {
      color: var(--text);
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">WorthIt</span>
    <h1>That page isn’t worth chasing.</h1>
    <p>The link is broken, the page moved, or GitHub Pages is still catching up. Head back to the homepage and you’ll be good.</p>
    <div class="actions">
      <a class="primary" href="./index.html">Go home</a>
      <a class="secondary" href="https://github.com/lucianpopa18" target="_blank" rel="noreferrer">GitHub</a>
    </div>
  </main>
</body>
</html>
